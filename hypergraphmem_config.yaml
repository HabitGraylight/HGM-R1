# hypergraphmem_config.yaml

# 基础路径 (会被环境变量 HYPERGRAPHMEM_MEMORY_DIR 覆盖，这里只是备用)
working_dir: "./output/memory_cache"

# 记忆生命周期
short_term_retention_seconds: 86400
short_to_long_term_threshold: 5

# 操作参数
operation:
  chunk_token_size: 1200
  chunk_overlap_token_size: 100
  max_participants_expand: 64
  top_m_hyperedges: 5
  top_n_chunks: 3

# LLM 服务配置 (用于提取、总结等)
llm:
  base_url: "http://10.26.1.186:8003/v1"
  api_key: "empty"
  model_name: "Qwen/Qwen3-8B-AWQ"
  concurrent_limit: 8
  max_token: 8192

# Embedding 服务配置
embedding:
  base_url: "http://10.26.1.184:8811/v1/embeddings"
  api_key: "empty"
  model_name: "Qwen3-Embedding-0.6B"
  embedding_dim: 1024

# Reranker 服务配置
reranker:
  base_url: "http://localhost:8080/engines/vllm/rerank"
  model_name: "ai/qwen3-reranker-vllm:4B"
  api_key: "empty"

# 存储后端
storage:
  vector_backend_preference: "nano"

# 检索参数
query:
  cos_top_k_entity: 3
  cos_top_k_hyperedge: 5
  rerank_top_k_hyperedge: 5
  rerank_top_k_chunk: 5

# 奖励模型参数
reward_kwargs:
  enable: true
  metric_weight: 0.4
  judge_weight: 0.6
  metric_type: "f1"
  eval_model: "gpt-4o"
  eval_base_url: "http://10.26.1.186:8003/v1"
  eval_api_key: "empty"